AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Slack Partner Central Bot — deploy-agnostic template.
  Provisions Lambda + API Gateway + DynamoDB + Secrets Manager + CloudWatch alarms.
  Every resource name derives from StackNamePrefix, so multiple copies can coexist
  in the same account and the template deploys cleanly into any account.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Naming and packaging
        Parameters:
          - StackNamePrefix
          - LambdaS3Bucket
          - LambdaS3Key
      - Label:
          default: Partner Central configuration
        Parameters:
          - Catalog
          - AcknowledgeProduction
      - Label:
          default: Lambda tuning
        Parameters:
          - LambdaTimeoutSeconds
          - LambdaMemorySize
          - LogRetentionDays
      - Label:
          default: Feature flags
        Parameters:
          - StreamingEnabled
      - Label:
          default: Operations
        Parameters:
          - AlarmEmail
    ParameterLabels:
      StackNamePrefix: { default: Resource name prefix }
      LambdaS3Bucket: { default: S3 bucket with lambda.zip }
      LambdaS3Key: { default: S3 key for lambda.zip }
      Catalog: { default: Partner Central catalog }
      AcknowledgeProduction: { default: Acknowledge production impact }
      LambdaTimeoutSeconds: { default: Lambda timeout }
      LambdaMemorySize: { default: Lambda memory }
      LogRetentionDays: { default: CloudWatch log retention }
      StreamingEnabled: { default: MCP streaming responses }
      AlarmEmail: { default: Alarm notification email }

Parameters:
  StackNamePrefix:
    Type: String
    Default: slack-pc-bot
    Description: >
      Prefix applied to every resource name. Use distinct prefixes to run
      multiple copies (dev/staging/prod) in the same account. Must be
      lowercase alphanumeric with hyphens, 3–24 chars.
    AllowedPattern: '[a-z][a-z0-9-]{2,23}'
    ConstraintDescription: >
      Must start with a lowercase letter, contain only lowercase letters,
      digits and hyphens, and be 3–24 characters long.

  Catalog:
    Type: String
    Default: Sandbox
    AllowedValues: [Sandbox, AWS]
    Description: >
      Partner Central catalog. Use Sandbox for all testing. Selecting AWS
      requires setting AcknowledgeProduction=true as an explicit safety gate.

  AcknowledgeProduction:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Must be 'true' if Catalog=AWS. Acknowledges that operations will affect
      live partner data. Ignored for Sandbox.

  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing the Lambda deployment package.

  LambdaS3Key:
    Type: String
    Default: slack-partner-central/lambda.zip
    Description: S3 key for the Lambda deployment package.

  LambdaTimeoutSeconds:
    Type: Number
    Default: 120
    MinValue: 30
    MaxValue: 900
    Description: >
      Lambda timeout. MCP streaming responses can take 30–60s; default 120s
      leaves headroom. Slack's 3s ack is handled by async self-invocation.

  LambdaMemorySize:
    Type: Number
    Default: 512
    MinValue: 256
    MaxValue: 3008
    Description: Lambda memory allocation in MB. Observed usage is around 150MB.

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 180, 365]
    Description: CloudWatch Logs retention for the Lambda log group.

  StreamingEnabled:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: >
      Toggle Server-Sent Events streaming from the MCP server. Disabling
      falls back to buffered responses. Read by the Lambda at runtime.

  AlarmEmail:
    Type: String
    Default: ''
    Description: >
      Optional email for CloudWatch alarm notifications. Leave blank to skip
      SNS topic and alarm creation.

Conditions:
  ProductionCatalog: !Equals [!Ref Catalog, 'AWS']
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Rules:
  ProductionAcknowledged:
    RuleCondition: !Equals [!Ref Catalog, 'AWS']
    Assertions:
      - Assert: !Equals [!Ref AcknowledgeProduction, 'true']
        AssertDescription: >
          When Catalog=AWS, AcknowledgeProduction must be 'true' to confirm
          you understand this will affect live production partner data.

Resources:

  # --- Secrets Manager: Slack credentials (populated post-deploy) ---
  SlackSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '${StackNamePrefix}-slack-credentials'
      Description: >
        Slack Bot Token and Signing Secret. Created with placeholders;
        populate via `aws secretsmanager put-secret-value` after stack deploy.
      SecretString: |
        {"SLACK_BOT_TOKEN":"xoxb-REPLACE-ME","SLACK_SIGNING_SECRET":"REPLACE-ME"}
      Tags:
        - Key: Project
          Value: SlackPartnerCentral
        - Key: ManagedBy
          Value: !Ref AWS::StackName

  # --- DynamoDB: Thread-to-Session mapping + dedupe ---
  SessionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${StackNamePrefix}-sessions'
      AttributeDefinitions:
        - AttributeName: threadTs
          AttributeType: S
      KeySchema:
        - AttributeName: threadTs
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Project
          Value: SlackPartnerCentral
        - Key: ManagedBy
          Value: !Ref AWS::StackName

  # --- CloudWatch Log Group for the Lambda ---
  # Declared explicitly so retention is set and teardown is clean.
  LambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${StackNamePrefix}-bot'
      RetentionInDays: !Ref LogRetentionDays

  # --- IAM Role for Lambda ---
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${StackNamePrefix}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                Resource: !GetAtt SessionTable.Arn
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref SlackSecret
        - PolicyName: PartnerCentralMCPAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - partnercentral:UseSession
                  - partnercentral:List*
                  - partnercentral:Get*
                  - partnercentral:UpdateOpportunity
                  - partnercentral:SubmitOpportunity
                  - partnercentral:AssignOpportunity
                  - partnercentral:AssociateOpportunity
                  - partnercentral:DisassociateOpportunity
                  - partnercentral:CreateBenefitApplication
                  - partnercentral:UpdateBenefitApplication
                  - partnercentral:SubmitBenefitApplication
                Resource: '*'
                Condition:
                  Bool:
                    aws:IsMcpServiceAction: 'true'
        - PolicyName: PartnerCentralDirectAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - partnercentral:*
                  - aws-marketplace:DescribeEntity
                  - aws-marketplace:SearchAgreements
                  - aws-marketplace:ListEntities
                Resource: '*'
        - PolicyName: LambdaSelfInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${StackNamePrefix}-bot'

  # --- Lambda Function ---
  SlackBotFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaLogGroup
    Properties:
      FunctionName: !Sub '${StackNamePrefix}-bot'
      Runtime: nodejs20.x
      Handler: lambda.handler
      Timeout: !Ref LambdaTimeoutSeconds
      MemorySize: !Ref LambdaMemorySize
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key
      Environment:
        Variables:
          SLACK_SECRET_NAME: !Ref SlackSecret
          SESSION_TABLE_NAME: !Ref SessionTable
          DEDUPE_TABLE_NAME: !Ref SessionTable
          CATALOG: !Ref Catalog
          ACKNOWLEDGE_PRODUCTION: !If [ProductionCatalog, 'true', 'false']
          STREAMING_ENABLED: !Ref StreamingEnabled
      Tags:
        - Key: Project
          Value: SlackPartnerCentral
        - Key: ManagedBy
          Value: !Ref AWS::StackName

  # --- API Gateway (REST) ---
  # Name is intentionally unset so the physical API id is stable across updates.
  SlackApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${StackNamePrefix}-api'
      Description: API Gateway for Slack Partner Central Bot
      EndpointConfiguration:
        Types:
          - REGIONAL

  SlackApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref SlackApi
      ParentId: !GetAtt SlackApi.RootResourceId
      PathPart: slack

  SlackApiEventsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref SlackApi
      ParentId: !Ref SlackApiResource
      PathPart: events

  SlackApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref SlackApi
      ResourceId: !Ref SlackApiEventsResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${SlackBotFunction.Arn}/invocations'

  SlackApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: SlackApiMethod
    Properties:
      RestApiId: !Ref SlackApi

  SlackApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref SlackApi
      DeploymentId: !Ref SlackApiDeployment
      StageName: prod

  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref SlackBotFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${SlackApi}/*/POST/slack/events'

  # --- CloudWatch Alarms (optional — only created if AlarmEmail provided) ---
  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: !Sub '${StackNamePrefix}-alarms'

  AlarmSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlarmEmail
    Properties:
      TopicArn: !Ref AlarmTopic
      Protocol: email
      Endpoint: !Ref AlarmEmail

  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmName: !Sub '${StackNamePrefix}-errors'
      AlarmDescription: More than 3 Lambda errors in 5 minutes
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref SlackBotFunction
      AlarmActions:
        - !Ref AlarmTopic

  DurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: HasAlarmEmail
    Properties:
      AlarmName: !Sub '${StackNamePrefix}-slow-duration'
      AlarmDescription: Lambda duration approaching timeout
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref LambdaTimeoutSeconds
      # Threshold is in ms at the metric level; multiply timeout seconds by 1000 via a stage variable
      # (CloudFormation can't do arithmetic; we accept that this fires slightly sooner than the raw timeout.
      # Good enough for alerting — an alarm at 120s tells us the function was close to timing out.)
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref SlackBotFunction
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  SlackEventsUrl:
    Description: >
      Paste this into your Slack app's Event Subscriptions, Interactivity,
      and every Slash Command Request URL.
    Value: !Sub 'https://${SlackApi}.execute-api.${AWS::Region}.amazonaws.com/prod/slack/events'
    Export:
      Name: !Sub '${AWS::StackName}-SlackEventsUrl'

  SlackSecretArn:
    Description: Populate this secret with real Slack tokens after deploy.
    Value: !Ref SlackSecret
    Export:
      Name: !Sub '${AWS::StackName}-SlackSecretArn'

  SlackSecretName:
    Description: Name of the Slack credentials secret (for put-secret-value commands).
    Value: !Sub '${StackNamePrefix}-slack-credentials'

  SessionTableName:
    Description: DynamoDB table for sessions and dedupe.
    Value: !Ref SessionTable

  LambdaFunctionName:
    Description: Lambda function name.
    Value: !Ref SlackBotFunction

  LambdaFunctionArn:
    Description: Lambda function ARN.
    Value: !GetAtt SlackBotFunction.Arn

  AlarmTopicArn:
    Condition: HasAlarmEmail
    Description: SNS topic ARN for CloudWatch alarms (subscribe additional endpoints if needed).
    Value: !Ref AlarmTopic

  NextSteps:
    Description: Post-deploy setup.
    Value: !Sub |-
      1. Populate Slack credentials:
         aws secretsmanager put-secret-value --secret-id ${StackNamePrefix}-slack-credentials --secret-string '{"SLACK_BOT_TOKEN":"xoxb-...","SLACK_SIGNING_SECRET":"..."}'
      2. Create Slack app from deployment/slack-manifest.yaml, replacing YOUR_API_GATEWAY_URL with the SlackEventsUrl above.
      3. Install the Slack app to your workspace, copy the bot token and signing secret into the secret above.
      4. Test with /pc-session in any Slack channel.
